<!-- public/index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="color-scheme" content="dark">
    <title>Мой VPN Профиль</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-tertiary: #ec4899;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(139, 92, 246, 0.12) 0%, transparent 40%);
            animation: pulse 20s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
            padding-bottom: 100px;
        }

        .header {
            text-align: center;
            padding: 24px 0;
            margin-bottom: 8px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: var(--accent-primary);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .avatar {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: var(--accent-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: white;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.5);
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            padding: 4px;
            background: var(--accent-gradient);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.6;
        }

        .avatar-status {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border: 3px solid var(--bg-secondary);
            border-radius: 50%;
        }

        .avatar-status.inactive {
            background: var(--danger);
        }

        .profile-info h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-info .username {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-expired {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .progress-container {
            margin: 20px 0;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .progress-bar {
            height: 10px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 5px;
            transition: width 0.8s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill.warning {
            background: linear-gradient(90deg, var(--warning), var(--danger));
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .info-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .info-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(99, 102, 241, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            font-size: 18px;
        }

        .info-text {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 15px;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.6);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--glass-border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 24px;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        .state-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 40px 20px;
        }

        .state-icon {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 24px;
            border: 1px solid var(--glass-border);
        }

        .state-icon.error {
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .state-icon.empty {
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
        }

        .state-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .state-description {
            color: var(--text-secondary);
            font-size: 15px;
            max-width: 300px;
            margin-bottom: 24px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(16, 185, 129, 0.95);
            backdrop-filter: blur(20px);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: rgba(239, 68, 68, 0.95);
        }

        .fade-in {
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        .pulse-dot::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: var(--success);
            opacity: 0.4;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>Загрузка профиля...</p>
        </div>
    </div>

    <div class="toast" id="toast">Скопировано!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#0a0a0f');
        tg.setBackgroundColor('#0a0a0f');

        const app = document.getElementById('app');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = 'toast ' + (type === 'error' ? 'error' : '');
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred(type);
            }
            requestAnimationFrame(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', { 
                day: 'numeric', 
                month: 'long', 
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatShortDate(dateString) {
            if (!dateString) return '—';
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function getInitials(firstName, lastName) {
            return ((firstName?.[0] || '') + (lastName?.[0] || '')).toUpperCase() || 'U';
        }

        function getTimeLeftText(days) {
            if (days <= 0) return 'Истекла';
            if (days === 1) return '1 день';
            if (days < 5) return `${days} дня`;
            return `${days} дней`;
        }

        async function apiCall(endpoint, data) {
            const response = await fetch('/api/' + endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'Network error');
            }
            
            return response.json();
        }

        async function loadProfile() {
            try {
                if (!tg.initData) {
                    throw new Error('Откройте через Telegram');
                }

                const data = await apiCall('profile', {
                    init_data: tg.initData
                });

                if (!data.exists) {
                    renderNotFound(data);
                    return;
                }

                renderProfile(data);
                tg.ready();
                
            } catch (error) {
                renderError(error.message);
            }
        }

        function renderNotFound(data) {
            app.innerHTML = `
                <div class="state-container fade-in">
                    <div class="state-icon empty">🔍</div>
                    <h2 class="state-title">Профиль не найден</h2>
                    <p class="state-description">${data.message || 'Вы не зарегистрированы'}</p>
                    <button class="btn btn-primary" onclick="startBot()">
                        <i class="fas fa-robot"></i>
                        Перейти к боту
                    </button>
                </div>
            `;
        }

        function renderError(message) {
            app.innerHTML = `
                <div class="state-container fade-in">
                    <div class="state-icon error">⚠️</div>
                    <h2 class="state-title">Ошибка</h2>
                    <p class="state-description">${message}</p>
                    <button class="btn btn-primary" onclick="location.reload()">
                        <i class="fas fa-redo"></i>
                        Обновить
                    </button>
                </div>
            `;
        }

        function renderProfile(data) {
            const user = data.user;
            const rw = data.remnawave;
            const isActive = user.is_active && !user.is_expired;
            const daysPercent = Math.min((user.days_left / 30) * 100, 100);
            
            let statusClass = 'status-active';
            let statusText = 'Активен';
            let statusIcon = '<span class="pulse-dot"></span>';
            
            if (user.is_expired) {
                statusClass = 'status-expired';
                statusText = 'Истекла';
                statusIcon = '<i class="fas fa-exclamation-circle"></i>';
            } else if (user.days_left <= 3) {
                statusClass = 'status-warning';
                statusText = 'Истекает';
                statusIcon = '<i class="fas fa-clock"></i>';
            }

            const trafficPercent = rw && rw.traffic_limit > 0 
                ? Math.min((rw.used_traffic / rw.traffic_limit) * 100, 100) 
                : 0;
            
            const isTrafficWarning = trafficPercent > 90;

            app.innerHTML = `
                <div class="header fade-in">
                    <h1>Мой Профиль</h1>
                    <p>VPN Подписка</p>
                </div>

                <div class="glass-card fade-in">
                    <div class="profile-header">
                        <div class="avatar">
                            ${getInitials(user.first_name, user.last_name)}
                            <div class="avatar-status ${!isActive ? 'inactive' : ''}"></div>
                        </div>
                        <div class="profile-info">
                            <h2>${user.first_name || 'Пользователь'} ${user.last_name || ''}</h2>
                            <div class="username">${user.username ? '@' + user.username : 'ID: ' + user.telegram_id}</div>
                            <span class="status-badge ${statusClass}" style="margin-top: 10px;">
                                ${statusIcon} ${statusText}
                            </span>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">${user.days_left}</div>
                            <div class="stat-label">${getTimeLeftText(user.days_left)}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${user.devices_count || 0}/${user.devices_limit}</div>
                            <div class="stat-label">Устройств</div>
                        </div>
                    </div>

                    <div class="progress-container">
                        <div class="progress-header">
                            <span>Срок действия</span>
                            <span>${formatShortDate(user.expire_at)}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${daysPercent < 20 ? 'warning' : ''}" 
                                 style="width: ${daysPercent}%"></div>
                        </div>
                    </div>
                </div>

                <div class="glass-card fade-in">
                    <div class="card-title">
                        <i class="fas fa-crown"></i>
                        Тариф: ${user.tariff_name || user.tariff}
                    </div>
                    
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-left">
                                <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
                                <div class="info-text">
                                    <span class="info-label">Действует до</span>
                                    <span class="info-value">${formatDate(user.expire_at)}</span>
                                </div>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-left">
                                <div class="info-icon"><i class="fas fa-wallet"></i></div>
                                <div class="info-text">
                                    <span class="info-label">Баланс</span>
                                    <span class="info-value">${user.balance.toFixed(2)} ₽</span>
                                </div>
                            </div>
                        </div>

                        ${rw ? `
                        <div class="info-item">
                            <div class="info-left">
                                <div class="info-icon"><i class="fas fa-exchange-alt"></i></div>
                                <div class="info-text">
                                    <span class="info-label">Трафик</span>
                                    <span class="info-value ${isTrafficWarning ? 'text-warning' : ''}">
                                        ${formatBytes(rw.used_traffic)} 
                                        ${rw.traffic_limit > 0 ? '/ ' + formatBytes(rw.traffic_limit) : ''}
                                    </span>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                    </div>

                    ${rw && rw.traffic_limit > 0 ? `
                    <div class="progress-container" style="margin-top: 20px;">
                        <div class="progress-header">
                            <span>Использовано</span>
                            <span class="${isTrafficWarning ? 'text-warning' : ''}">${trafficPercent.toFixed(1)}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${isTrafficWarning ? 'warning' : ''}" 
                                 style="width: ${trafficPercent}%"></div>
                        </div>
                    </div>
                    ` : ''}
                </div>

                <div class="glass-card fade-in">
                    <div class="card-title">
                        <i class="fas fa-bolt"></i>
                        Действия
                    </div>
                    
                    <button class="btn btn-primary" onclick="copySubscription('${user.subscription_url}')">
                        <i class="fas fa-copy"></i>
                        Копировать ссылку
                    </button>
                    
                    ${rw?.happ_link ? `
                    <button class="btn btn-success" onclick="tg.openLink('${rw.happ_link}')">
                        <i class="fas fa-mobile-alt"></i>
                        Hiddify
                    </button>
                    ` : ''}
                    
                    <button class="btn btn-secondary" onclick="refreshSubscription()">
                        <i class="fas fa-sync-alt"></i>
                        Обновить подписку
                    </button>
                </div>

                <div class="glass-card fade-in" style="text-align: center; padding: 20px;">
                    <div style="font-size: 12px; color: var(--text-secondary);">
                        <i class="fas fa-shield-alt" style="color: var(--success);"></i>
                        Защищенное соединение
                    </div>
                </div>
            `;
            
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    const width = bar.style.width;
                    bar.style.width = '0%';
                    setTimeout(() => bar.style.width = width, 100);
                });
            }, 100);
        }

        function startBot() {
            tg.openTelegramLink('https://t.me/YourBot');
        }

        async function copySubscription(url) {
            if (!url) return showToast('Недоступно', 'error');
            try {
                await navigator.clipboard.writeText(url);
                showToast('Скопировано!');
            } catch (err) {
                showToast('Ошибка копирования', 'error');
            }
        }

        async function refreshSubscription() {
            if (!confirm('Обновить подписку? Старая ссылка перестанет работать.')) return;
            
            tg.MainButton.setText('Обновление...');
            tg.MainButton.show();
            tg.MainButton.showProgress(false);
            
            try {
                await apiCall('refresh', { init_data: tg.initData });
                showToast('Обновлено!');
                setTimeout(() => loadProfile(), 1000);
            } catch (error) {
                showToast('Ошибка: ' + error.message, 'error');
            } finally {
                tg.MainButton.hideProgress();
                tg.MainButton.hide();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
